# markdownlint configuration for this repo's docs (MkDocs Material site).
# Codacy runs markdownlint in config-file mode and auto-detects this file.
# We keep structural rules on, but disable purely-cosmetic rules and rules
# that conflict with our MkDocs/generated-docs conventions.
default: true

# Prose and generated tables are not hard-wrapped — line length is noise.
MD013: false

# MkDocs Material relies on inline HTML (admonitions, attribute lists,
# <details>, badges), so inline HTML is expected, not a defect.
MD033: false

# Generated/tabbed/changelog docs legitimately repeat heading text and may
# use more than one top-level heading per page.
MD024: false
MD025: false

# Front matter and nav titles mean the first line isn't always a heading.
MD041: false

# Output dumps and mixed indented/fenced blocks are intentional.
MD040: false
MD046: false

# Cosmetic table and list styling we don't enforce.
MD060: false
MD030: false
MD029: false
MD007: false
MD004: false

# Emphasis-as-heading and trailing punctuation are stylistic choices here.
MD036: false
MD026: false

# Generated docs (e.g. docs/metrics/metrics.md) can carry extra blank lines and
# list/fence spacing that aren't worth enforcing on machine output.
MD012: false
MD031: false
MD032: false
