# graph2otel example configuration.
#
# This file is optional: with no -config flag graph2otel runs from its
# built-in defaults plus environment variables alone (the container-friendly
# path). Any key you omit here keeps its default; any key you set here is
# overridden by the matching G2O_ environment variable if one is set (env
# always wins). See the "__" nesting rule below.
#
# IMPORTANT — no secrets or auth material belong in this file, ever:
#   * Tenant credentials (client secret, certificate, or workload/managed
#     identity) are NEVER read from tenants[] or from any key in this file.
#     They come from azidentity.DefaultAzureCredential, which reads its own
#     well-known environment variables at run time:
#       AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#       AZURE_CLIENT_CERTIFICATE_PATH, or ambient workload/managed identity.
#     tenants[].tenant_id / client_id below are non-secret identifiers only —
#     they select which tenant/app registration a collector run targets.
#   * otlp.grafana_cloud.token IS a credential and belongs in the
#     G2O_OTLP__GRAFANA_CLOUD__TOKEN environment variable instead of this
#     file. It is shown here only to document the key name.

log_level: info # debug | info | warn | error

# tenants lists every Entra tenant graph2otel polls. At least one entry is
# required unless otlp.protocol is "stdout". Set via env with
# G2O_TENANTS__<index>__<field> is NOT supported (a flat env var cannot
# express a list of structs) — use this file for tenants.
tenants:
  - tenant_id: "00000000-0000-0000-0000-000000000000" # Entra tenant GUID or verified domain
    client_id: "" # app registration (application) ID; optional if AZURE_CLIENT_ID is set
    # Optional per-tenant collector overrides. These layer on top of the global
    # `collectors` block below, winning field-by-field, so one tenant can
    # disable a collector (or retune its interval) that the rest keep enabled.
    # collectors:
    #   sign_ins:
    #     enabled: false
    #
    # Optional read-only Azure Storage blob ingest — the ONE place graph2otel
    # reads from outside Microsoft Graph. It exists for the signals Graph has no
    # endpoint for at all (MicrosoftGraphActivityLogs, and see docs/blob-ingest.md
    # for the rest), which reach you only as Azure Monitor diagnostic-settings
    # output landing in a storage account.
    #
    # Setting account_url IS the opt-in: leave it unset (the default) and no
    # blob collectors are registered, so a deployment with no storage account is
    # completely unaffected. No credential goes here — this tenant's existing
    # AZURE_* credential is reused, and it needs the DATA-plane role
    # "Storage Blob Data Reader" on that account (Owner is NOT enough; it grants
    # container listing but not blob content reads).
    # blob_ingest:
    #   account_url: "https://myaccount.blob.core.windows.net"

otlp:
  protocol: http # grpc | http | stdout (stdout = print signals to the console for local debug, no backend)
  endpoint: "https://otlp-gateway-prod-us-central-0.grafana.net/otlp" # OTLP base URL (the exporter appends /v1/metrics and /v1/logs itself)
  grafana_cloud:
    instance_id: "" # Grafana Cloud OTLP instance ID
    token: "" # DO NOT set here — use G2O_OTLP__GRAFANA_CLOUD__TOKEN instead

# collectors overrides per-collector behavior globally (across all tenants),
# keyed by collector name. A collector omitted here runs enabled at its
# built-in default interval. `enabled` unset means "default true" (distinct from
# an explicit false); `interval` unset (or 0) means "use the collector default".
# A collector name containing an underscore stays addressable via env using the
# "__" nesting / single "_" preserved rule, e.g. collectors.sign_ins.enabled ->
# G2O_COLLECTORS__SIGN_INS__ENABLED=false.
collectors: {}
#   sign_ins:
#     enabled: true
#     interval: "5m"  # duration string: "30s", "5m", "168h" (minimum 1s)
#
# Experimental (beta / new-surface) collectors are OFF unless explicitly enabled
# here — a beta Graph change can never break a default deployment. To opt in
# (quote keys that contain dots):
#   "m365.unified_audit":       # Exchange/SharePoint/OneDrive/Teams activity as OTLP
#     enabled: true             # logs via the async Purview Audit query API. Needs
#                               # AuditLogsQuery.Read.All + Purview Audit (E3+). Coarse
#                               # interval only — the query API 429s on rapid create.
#
# Large-tenant tuning (10k+ users/devices). The built-in intervals are sized for
# a typical tenant; every collector's cadence is already overridable here (and
# per-tenant under tenants[].collectors), so widening a few full-collection
# pollers is a config change, not a code change. graph2otel already requests
# Graph's largest page size (Prefer: odata.maxpagesize) on every full-collection
# walk, so page counts stay ~10x lower than Graph's default — but on a very large
# tenant these three collectors do the most per-cycle work and are the ones worth
# stretching if you want to cut Graph call volume further. Keys are the full
# collector names, so quote them (they contain dots):
#   "intune.devices":          # full managedDevices fleet page-walk (default 1h)
#     interval: "3h"
#   "intune.malware":          # managedDevices walk + per-Windows-device Defender sweep (default 30m)
#     interval: "2h"
#   "entra.credential_expiry": # /applications + /servicePrincipals keyCredentials walk (default 15m)
#     interval: "1h"           # Graph throttles $select=keyCredentials tighter (~150/min per tenant); widen on a large app estate

# admin exposes an operator health/status HTTP endpoint (liveness + per-collector
# status). Disabled by default; bind address defaults to :9090.
admin:
  enabled: false # run the admin/health HTTP endpoint (liveness + per-collector status)
  addr: ":9090" # bind address for the admin endpoint

# profiling enables optional Grafana Pyroscope continuous profiling (default
# off). It has no effect on the exporter's core job and a failure to reach
# Pyroscope is non-fatal. basic_auth_password is a credential — set it via
# G2O_PROFILING__PYROSCOPE__BASIC_AUTH_PASSWORD, never in committed YAML.
profiling:
  pyroscope:
    enabled: false # run the Pyroscope continuous-profiling push agent
    # Grafana Cloud Profiles ingest endpoint (e.g. https://profiles-prod-NNN.grafana.net).
    server_address: "" # REQUIRED when enabled, e.g. http://pyroscope:4040 or https://profiles-prod-NNN.grafana.net
    basic_auth_user: "" # Grafana Cloud Profiles user/instance ID
    basic_auth_password: "" # DO NOT set here — use the env var above
    tenant_id: "" # optional; leave empty for Grafana Cloud
    upload_rate: 15s # optional; 0/omit uses the pyroscope default
    tags: {} # extra static tags; service_version is always set and cannot be overridden
  # runtime mutex/block sampling; on by default. Applied only when the pyroscope
  # push is enabled, so it costs nothing when profiling is off. Set either to 0 to
  # drop that contention profile.
  mutex_profile_fraction: 5      # runtime.SetMutexProfileFraction; 0 = disabled
  block_profile_rate: 100000     # runtime.SetBlockProfileRate (ns, 100µs); 0 = disabled

# cardinality governs output-side active-series limits (Grafana Cloud bills on
# active series). metric_limit is a hard per-instrument cap: distinct attribute
# sets beyond it collapse into the SDK's otel.metric.overflow series (dropped +
# counted) instead of growing the bill, and graph2otel.series.active/.limit/
# .overflowing report where each metric sits against it. graph2otel's metrics are
# bounded aggregates, so the default 2000 is a blast-radius guard against a
# mis-scoped label, not a normal constraint. Set 0 for unlimited.
# Env: G2O_CARDINALITY__METRIC_LIMIT.
cardinality:
  metric_limit: 2000 # hard per-instrument active-series cap; beyond it the SDK collapses extras into otel.metric.overflow (0 = unlimited)

# checkpoint_dir is where window-log collectors persist their per-(tenant,
# endpoint) watermarks so a restart resumes rather than re-fetching or dropping.
# It MUST be writable and persistent: without it every restart re-polls each
# collector's whole initial-lookback window (a burst of duplicate log records in
# the backend), and an outage longer than that lookback silently drops the events
# in between. graph2otel fails fast at startup if it is unwritable (#117).
# In a container this relative default cannot work — the image is read-only —
# so override it to an absolute path on a mounted volume (see docker-compose.yml,
# which sets G2O_CHECKPOINT_DIR=/var/lib/graph2otel against a bind mount owned by
# uid 65532; the Helm chart sets it to /var/lib/graph2otel/checkpoints).
checkpoint_dir: "./checkpoints" # root dir for the file-based CheckpointStore
