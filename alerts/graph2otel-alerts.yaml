# Grafana-managed alerting rules (file provisioning), hand-authored — not
# generated. See README.md for the doc block (what/why/threshold rationale/
# false-positive notes/applicability) per rule; this file is deliberately
# comment-light so the YAML and the docs don't drift out of sync.
#
# Four PRIMARY rules (isPaused: false) satisfy the four alert categories in
# tracking issue #30: credential/token expiry, compliance drop, collector
# staleness, throttle saturation. Each also ships one or more COMPANION rules
# (isPaused: true) — a different source metric or severity tier for the same
# failure mode — enable them in the UI once you've looked at whether they fit
# your tenant. This mirrors the default-disabled pattern in the sibling
# tailscale2otel repo's deploy/alerts/tailscale2otel.grafana-rules.yaml.
#
# Every rule is the canonical Grafana 3-node pipeline — A (Prometheus query) →
# B (reduce, last) → C (threshold), condition: C — so it round-trips through
# the Grafana UI/API. datasourceUid uses the portable Grafana Cloud default
# ("grafanacloud-prom"); replace it with your own Prometheus/Mimir datasource
# UID (`gcx datasources list` or Connections → Data sources in the UI).
#
# Metric names assume OTLP → Prometheus normalization (dots → underscores,
# `_total` on counters) — see the CLAUDE.md "Metric namespaces" section and
# README.md. If your OTLP→Prometheus pipeline preserves original names, adjust
# every expr accordingly.
apiVersion: 1
groups:
  - orgId: 1
    name: "graph2otel-alerts"
    folder: "graph2otel"
    interval: "5m"
    rules:
      # --- Credential & token expiry (doc block 1) ---------------------------
      - uid: "g2o-entra-cred-expiry-critical"
        title: "Entra app/SP credential expiring within 7 days"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tenant_id, owner_type, credential_type) (entra_credentials_expiring_total{expiry_bucket=~\"lt_7d|expired\"})"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "critical"
          category: "credential-expiry"
          source: "entra"
        annotations:
          summary: "{{ $labels.owner_type }} {{ $labels.credential_type }} credential(s) expiring within 7 days (tenant {{ $labels.tenant_id }})"
          description: "entra_credentials_expiring_total is non-zero in the lt_7d/expired buckets for tenant {{ $labels.tenant_id }}, owner_type={{ $labels.owner_type }}, credential_type={{ $labels.credential_type }} for 15m. Bucket-count based (never per-credential) — see README.md doc block 1 for the false-positive notes and the lt_30d warning-tier companion rule."
        isPaused: false

      - uid: "g2o-entra-cred-expiry-warning"
        title: "Entra app/SP credential expiring within 30 days"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tenant_id, owner_type, credential_type) (entra_credentials_expiring_total{expiry_bucket=\"lt_30d\"})"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "warning"
          category: "credential-expiry"
          source: "entra"
        annotations:
          summary: "{{ $labels.owner_type }} {{ $labels.credential_type }} credential(s) expiring within 30 days (tenant {{ $labels.tenant_id }})"
          description: "Companion to g2o-entra-cred-expiry-critical: earlier warning tier on the lt_30d bucket. Paused by default — enable once you've picked a rotation-lead-time that matches your tenant's actual credential renewal process."
        isPaused: true

      - uid: "g2o-intune-apple-token-expiry-critical"
        title: "Intune Apple MDM token expiring soon"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "min by (tenant_id, type, token_name) (intune_apple_token_days_until_expiry)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "lt"
                    params:
                      - 14
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "critical"
          category: "credential-expiry"
          source: "intune-apple-token"
        annotations:
          summary: "Apple {{ $labels.type }} token \"{{ $labels.token_name }}\" expires in under 14 days (tenant {{ $labels.tenant_id }})"
          description: "intune_apple_token_days_until_expiry (APNS/VPP/DEP) is below 14 for token_name={{ $labels.token_name }}, tenant {{ $labels.tenant_id }}, for 15m. Unlike the bucketed metrics, this is a raw days-remaining gauge over a tiny admin-configured token set, so the threshold is an exact day count — tune freely. Paused by default (companion of the primary compliance/credential set) — enable once the apple_tokens collector is on for tenants that use Apple MDM."
        isPaused: true

      - uid: "g2o-intune-cert-expiry-critical"
        title: "Intune certificate expiring within 7 days"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tenant_id, cert_profile_name) (intune_certificate_days_until_expiry{expiry_bucket=~\"0d_7d|expired\"})"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "critical"
          category: "credential-expiry"
          source: "intune-certificate"
        annotations:
          summary: "Intune certificate profile \"{{ $labels.cert_profile_name }}\" has certificates expiring within 7 days (tenant {{ $labels.tenant_id }})"
          description: "intune_certificate_days_until_expiry is non-zero in the 0d_7d/expired buckets for cert_profile_name={{ $labels.cert_profile_name }}, tenant {{ $labels.tenant_id }}, for 15m. NOTE: cert expiry buckets are named differently from the entra credential buckets (0d_7d/7d_30d/30d_90d/over_90d/unknown vs lt_7d/lt_30d/lt_90d/gt_90d/expired) — see README.md. Paused by default — enable once the certificates collector (beta) is on."
        isPaused: true

      # --- Compliance drop (doc block 2) --------------------------------------
      - uid: "g2o-intune-compliance-ratio-low"
        title: "Intune compliant-device fraction below 90%"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "(sum by (tenant_id) (intune_compliance_devices{state=\"compliant\"}) / sum by (tenant_id) (intune_compliance_devices)) and sum by (tenant_id) (intune_compliance_devices) >= 5"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "lt"
                    params:
                      - 0.9
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "30m"
        labels:
          severity: "warning"
          category: "compliance"
          source: "intune"
        annotations:
          summary: "Intune compliant-device fraction below 90% (tenant {{ $labels.tenant_id }})"
          description: "compliant / total intune_compliance_devices is below 0.9 for tenant {{ $labels.tenant_id }} for 30m. The `and ... >= 5` guard suppresses the ratio on tiny fleets where one non-compliant device swings the percentage — see README.md doc block 2 for the false-positive notes."
        isPaused: false

      - uid: "g2o-intune-compliance-noncompliant-spike"
        title: "Intune non-compliant device share spiking"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "(delta((sum by (tenant_id) (intune_compliance_devices{state=\"non_compliant\"}))[1h:5m]) / sum by (tenant_id) (intune_compliance_devices)) and sum by (tenant_id) (intune_compliance_devices) >= 5"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0.1
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "warning"
          category: "compliance"
          source: "intune"
        annotations:
          summary: "Intune non-compliant device share rose more than 10 percentage points in an hour (tenant {{ $labels.tenant_id }})"
          description: "Companion to g2o-intune-compliance-ratio-low: catches a sharp swing even when the absolute ratio hasn't crossed 90% yet (e.g. a large compliant fleet with a sudden policy regression). Paused by default — the 1h/10pp thresholds are unvalidated against real fleet churn."
        isPaused: true

      # --- Collector staleness (doc block 3) ----------------------------------
      - uid: "g2o-collector-staleness"
        title: "graph2otel collector scrape stale"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "max by (tenant_id, collector) (graph2otel_scrape_staleness_seconds)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 3600
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "Alerting"
        execErrState: "OK"
        for: "5m"
        labels:
          severity: "critical"
          category: "self-observability"
          source: "graph2otel"
        annotations:
          summary: "Collector {{ $labels.collector }} hasn't scraped successfully in over an hour (tenant {{ $labels.tenant_id }})"
          description: "graph2otel_scrape_staleness_seconds for collector={{ $labels.collector }}, tenant {{ $labels.tenant_id }} has exceeded 3600s (the placeholder default: 3x a 20-minute poll interval) for 5m. Replace 3600 with 3x YOUR configured collector interval in seconds. noDataState is Alerting (not OK) because self-obs metrics are emitted by every running collector — a fully missing series means the process died or that collector was removed, same semantics as tailscale2otel's ExporterDown."
        isPaused: false

      - uid: "g2o-checkpoint-persist-errors"
        title: "graph2otel checkpoint persist failing"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tenant_id, collector) (increase(graph2otel_checkpoint_persist_errors_total[15m]))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "0m"
        labels:
          severity: "warning"
          category: "self-observability"
          source: "graph2otel"
        annotations:
          summary: "Collector {{ $labels.collector }} failing to persist its checkpoint (tenant {{ $labels.tenant_id }})"
          description: "Companion to g2o-collector-staleness: a WindowCollector's high-water mark isn't reaching disk, so a restart re-polls (or drops, depending on store) an already-processed window. Even one increment is worth knowing about — for is 0m. Paused by default — enable once you've picked a notification channel for it."
        isPaused: true

      # --- Throttle saturation (doc block 4) ----------------------------------
      - uid: "g2o-throttle-saturation"
        title: "graph2otel sustained Graph API throttling"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tenant_id, workload) (rate(graph2otel_throttle_count_total[10m]))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "warning"
          category: "throttle"
          source: "graph2otel"
        annotations:
          summary: "Sustained 429s from Microsoft Graph on the {{ $labels.workload }} workload (tenant {{ $labels.tenant_id }})"
          description: "rate(graph2otel_throttle_count_total[10m]) (429 responses observed by the client-side rate limiter) is above 0 for workload={{ $labels.workload }}, tenant {{ $labels.tenant_id }}, sustained for 15m — i.e. throttling that isn't a one-off blip but is still happening 10-15 minutes later. noDataState is OK — zero throttle events is the healthy steady state, not an absence worth alerting on. See README.md doc block 4 for per-workload ceiling context (none of the reporting 5/10s, Identity Protection 1/s, Intune reports-export 48/min, or directory RU workloads send Retry-After, so silent throttling degrades data freshness before anything else visibly breaks)."
        isPaused: false

      - uid: "g2o-throttle-budget-consumption"
        title: "graph2otel throttle budget consumption high"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "max by (tenant_id, workload) (graph2otel_throttle_limit_percentage)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 80
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "warning"
          category: "throttle"
          source: "graph2otel"
        annotations:
          summary: "Graph-reported throttle budget consumption above 80% on the {{ $labels.workload }} workload (tenant {{ $labels.tenant_id }})"
          description: "graph2otel_throttle_limit_percentage (from the x-ms-throttle-limit-percentage response header) is above 80 for workload={{ $labels.workload }}, tenant {{ $labels.tenant_id }}, sustained for 15m. Best-effort: this header isn't guaranteed on every 429 or every workload, so absence of data here does NOT mean the budget is healthy — g2o-throttle-saturation is the primary signal; this is a companion when the header happens to be present. Paused by default."
        isPaused: true
