# GoReleaser v2 — https://goreleaser.com
#
#   goreleaser check                       # validate this config
#   goreleaser release --snapshot --clean  # local dry run (binaries/archives)
#
# Real releases run in .github/workflows/release-please.yml (push to main, gated on
# release-please's release_created output — NOT a `v*` tag push; there is no
# release.yml). Its `binaries` job calls this config via the shared
# rknightion/.github binaries.yml reusable with `--skip=docker` and produces ONLY
# cross-compiled binaries, a SHA256SUMS file, per-archive SBOMs, and keyless cosign
# signatures, uploaded to the release release-please already created. The multi-arch
# GHCR image is built separately (repo-root Dockerfile, not GoReleaser) by the
# `publish` job via the shared container-publish.yml reusable — this file has no
# docker pipeline of its own.
version: 2

project_name: graph2otel

# Log the size of each built binary in the release output.
report_sizes: true

# Verifiable builds: fetch deps from proxy.golang.org and verify against
# sum.golang.org during release builds (the repo and module are public).
gomod:
  proxy: true

builds:
  - id: graph2otel
    main: ./cmd/graph2otel
    binary: graph2otel
    env:
      - CGO_ENABLED=0
      # Registers the goroutineleak pprof profile, pushed to Pyroscope by default
      # (the profiling code guards on availability). Keep in sync with the Makefile
      # and Dockerfile. Verified to cross-compile across the release matrix.
      - GOEXPERIMENT=goroutineleakprofile
    flags:
      - -trimpath
    ldflags:
      # Matches the repo-root Dockerfile. {{ .Version }} is the tag without the
      # leading "v" (e.g. 1.2.3), aligning the binary's reported version with the
      # image tags produced below.
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Runtime is Docker/Linux (the GHCR image is built from the repo-root
    # Dockerfile, not here); darwin is only for Apple-Silicon local dev. So this
    # is a deliberately trimmed 3-target matrix — linux/amd64, linux/arm64,
    # darwin/arm64 — NOT the 5-target sibling default. Cross-compiling the
    # msgraph-heavy tree is memory-hungry; fewer targets keep it fast and under
    # the runner's memory ceiling. Intel-Mac devs build locally (go build); there
    # is no windows target (this is a server-side agent).
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64

archives:
  - id: graph2otel
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

# Deterministic version for `--snapshot` builds (CI goreleaser-snapshot job and
# local dry runs). Real tagged releases use the git tag, not this template.
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

sboms:
  - id: archives
    artifacts: archive

# NOTE: this file deliberately has NO docker/dockers_v2 pipeline. The published
# multi-arch GHCR image is built from the repo-root Dockerfile by the `publish`
# job's shared container-publish.yml reusable, not by GoReleaser. Do not re-add a
# docker pipeline here without also removing the image build from
# publish.yml/container-publish.yml (double-publish risk).

# Keyless cosign signatures (GitHub OIDC) for the binary checksums file. Requires
# id-token: write and cosign v3+ on PATH (sigstore/cosign-installer, wired by the
# shared binaries.yml reusable via install-cosign: true).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
