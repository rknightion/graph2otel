name: CodeQL
on:
  push:
    branches: [main]
  schedule:
    - cron: '23 3 * * 2'
permissions: {}
jobs:
  codeql:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: rknightion/.github/.github/workflows/codeql.yml@65aedb61754e9bf31e947c17409256ba0c58c637 # v1.4.3
    with:
      languages: '[{"language":"go","build-mode":"autobuild"},{"language":"actions","build-mode":"none"}]'
