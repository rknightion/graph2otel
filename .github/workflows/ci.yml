name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # `-mod=readonly` only catches a go.mod missing a requirement, not stale
      # indirect/direct markers or leftover unused ones — `go mod tidy -diff`
      # reports those and exits non-zero without writing. Covers both modules;
      # fix locally with `make tidy`.
      - name: go.mod tidy check
        run: make tidy-check

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

      # tools/ holds separate CI-only modules (graphdrift, the Graph beta drift
      # canary), so the root `./...` above does not see them. graphdrift is
      # standard-library-only — no module downloads, a few seconds.
      - name: vet + test the tools modules
        run: make tools-check

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # gofmt/goimports are enforced here via the `formatters` block in
      # .golangci.yml, so there is no separate gofmt step.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...

  goreleaser-snapshot:
    name: goreleaser build (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          # Cache the module + build cache (keyed on go.sum). The msgraph-heavy
          # dependency tree is compiled once and restored on every subsequent
          # push, so a snapshot build only recompiles the packages that changed
          # instead of the whole tree cold. Build-cache objects are keyed per
          # GOOS/GOARCH, so every cross-compile target caches independently.
          cache: true

      # Replace the runner's default 4 GB swap with 12 GB. The standard runner is
      # 2-core/7 GB and the msgraph-heavy Go linker peaks ~3-4 GB per target, so
      # cross-compiling the full matrix in parallel OOM-kills the runner. Swap
      # lets the linker spill to the (SSD-backed) /mnt disk instead of dying —
      # slower only while actually swapping, but it makes the full matrix safe
      # without a paid larger runner. Mirrored in release-please.yml's pre-cmd.
      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      # Cross-compile every target + build archives/checksums. .goreleaser.yaml has
      # no docker pipeline (the real image build is the repo-root Dockerfile via
      # publish.yml/container-publish.yml), so no docker/qemu/syft is needed here;
      # the image is smoke-tested by docker-build below and fully built, pushed,
      # and signed by the `publish` job in release-please.yml.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          # -p 2 builds two targets concurrently (the full 5-target matrix at
          # unbounded parallelism is too memory-hungry even with swap). Two
          # concurrent msgraph linkers peak ~8 GB — mostly RAM, lightly into the
          # swap added above — so it stays fast while the swap prevents an OOM
          # kill. Release builds use the same cap.
          args: release --snapshot --clean --skip=publish,sign,sbom -p 2

  docker-build:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # The Dockerfile's `go build` step uses a BuildKit cache mount for the Go
      # build cache (/root/.cache/go-build). type=gha layer cache does NOT carry
      # cache-mount contents across runs, so restore/save it via actions/cache and
      # let buildkit-cache-dance inject it into (and extract it from) the build.
      - name: Restore Go build cache for Docker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: go-build-cache
          key: ${{ runner.os }}-docker-go-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-go-build-
      - name: Inject Go build cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "go-build-cache": "/root/.cache/go-build"
            }

      - name: build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: graph2otel:ci
          # Layer cache (base image, go.mod copy, go mod download) across runs.
          cache-from: type=gha,scope=ci-smoke
          cache-to: type=gha,mode=max,scope=ci-smoke
          build-args: |
            VERSION=ci-${{ github.sha }}

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: helm lint
        run: helm lint charts/graph2otel

      # The chart README is generated from values.yaml annotations (helm-docs). Fail
      # if it drifts — regenerate with `make helm-docs`.
      - name: helm-docs README up to date
        run: |
          make helm-docs
          git diff --exit-code charts/graph2otel/README.md

      - name: helm template
        run: helm template t charts/graph2otel > /dev/null

      # Exercise the non-default branches (existing secret, PVC persistence,
      # admin disabled) so a broken conditional doesn't slip past the default-
      # values render above.
      - name: helm template (persistence + existingSecret + admin disabled)
        run: |
          helm template t charts/graph2otel \
            --set persistence.enabled=true \
            --set existingSecret=my-secret \
            --set config.admin.enabled=false \
            > /dev/null

  # Dashboards-as-code gate (#218). Fails when a metric graph2otel emits is on no
  # panel and carries no waiver, when a waiver is stale or reasonless, when a
  # domain with a log-shaped signal ships no log panel (#162), or when
  # dashboards/*.json has drifted from grafana/boards/*.py.
  #
  # The builder is pure-stdlib python3, so there is deliberately no setup-python
  # step and nothing to install — the ubuntu runner's python3 is enough.
  # spec/signal-catalog.json's own staleness rides build-test's `go test`
  # (TestSignalCatalogInSync), so this job needs no Go toolchain either.
  grafana:
    name: dashboard coverage + freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Verify dashboard metric coverage, log-panel coverage and freshness
        run: make grafana-check

  # Test coverage -> Codacy. Deliberately NOT in ci-success's `needs`: coverage reporting is
  # informational, so a Codacy outage — or a fork PR with no secret — must never block merges or
  # Renovate automerge. The repo-scoped CODACY_PROJECT_TOKEN self-identifies the repo.
  coverage:
    name: coverage (Codacy)
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage profile
        run: make coverage

      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}   # skip on fork PRs (secret unavailable)
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.out
          force-coverage-parser: go

  # Single required status check for this workflow. Branch protection on `main`
  # requires this, so CI legs can be added or renamed without re-touching
  # protection. Fails if any leg failed or was cancelled.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [build-test, lint, govulncheck, goreleaser-snapshot, docker-build, helm, grafana]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
