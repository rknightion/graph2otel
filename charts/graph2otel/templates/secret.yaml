{{- if not .Values.existingSecret }}
{{- /*
Empty values are deliberately NOT rendered: an empty AZURE_* env var is still
a set variable inside the pod, and azidentity's environment-credential leg
treats a present-but-empty AZURE_CLIENT_SECRET differently from an absent
one — rendering "" here could break a deployment that intends to fall back
to workload/managed identity or a mounted certificate instead.
*/}}
{{- $vals := dict }}
{{- range $k, $v := .Values.secret }}
{{- if $v }}{{- $_ := set $vals $k $v }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graph2otel.fullname" . }}
  labels:
    {{- include "graph2otel.labels" . | nindent 4 }}
type: Opaque
{{- if $vals }}
stringData:
  {{- range $k, $v := $vals }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
